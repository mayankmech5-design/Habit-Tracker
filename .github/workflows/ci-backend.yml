name: CI/CD Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: ./
      - name: Run tests
        run: npm test || true

  vuln-audit:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies for audit
        run: npm ci
      - name: Run npm audit (save JSON)
        run: |
          npm audit --json > audit.json || true
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit.json
      - name: Try auto-fix vulnerabilities
        run: |
          npm audit fix || true
          npm audit --json > audit-after-fix.json || true
      - name: Upload post-fix report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report-after-fix
          path: audit-after-fix.json

  build-and-push-image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/habit-tracker-backend:${{ github.sha }}

  render-deploy:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_API_KEY != '' && secrets.RENDER_SERVICE_ID != '' }}
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":false}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys"

    android-build:
      needs: build-and-push-image
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '17'
        - name: Cache Gradle
          uses: actions/cache@v4
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/wrapper
            key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
        - name: Install Android SDK commandline tools
          run: |
            export ANDROID_SDK_ROOT=$HOME/Android/Sdk
            mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
            curl -sS -o cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip
            unzip -q cmdline.zip -d $ANDROID_SDK_ROOT/cmdline-tools
            mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest || true
            export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
            yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses || true
            sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          shell: bash
        - name: Build release APK
          run: |
            export ANDROID_SDK_ROOT=$HOME/Android/Sdk
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease -x lint
          shell: bash
        - name: Upload APK artifact
          uses: actions/upload-artifact@v4
          with:
            name: app-release-apk
            path: android/app/build/outputs/apk/release/app-release.apk
